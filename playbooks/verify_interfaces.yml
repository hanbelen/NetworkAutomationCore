---
- name: "VERIFY — Check interface status on discovered devices"
  hosts: all
  gather_facts: false
  become: true

  tasks:
    - name: "Check each expected port"
      ansible.builtin.shell: |
        show interfaces status {{ item }} | tail -1 | awk '{print $8}'
      register: port_status
      changed_when: false
      failed_when: false
      loop: "{{ active_ports }}"

    - name: "Build verification results"
      ansible.builtin.set_fact:
        intf_results: >-
          {{
            intf_results | default([]) + [{
              'port': item.item,
              'oper': item.stdout | trim,
              'ok': (item.stdout | trim) == 'up'
            }]
          }}
      loop: "{{ port_status.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: "Interface verification summary"
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }}:
          up={{ intf_results | selectattr('ok', 'true') | map(attribute='port') | list | join(', ') | default('none') }}
          | down={{ intf_results | selectattr('ok', 'false') | map(attribute='port') | list | join(', ') | default('none') }}
