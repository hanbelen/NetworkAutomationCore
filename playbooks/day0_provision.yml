---
# Play 1: Change password from SONiC factory default to 'admin'
# Overrides inventory credentials with factory default to connect.
- name: "DAY0 — Set admin password"
  hosts: all
  gather_facts: false
  become: true
  vars:
    ansible_password: "YourPaSsWoRd"
    ansible_become_password: "YourPaSsWoRd"
  tasks:
    - name: "Set admin password"
      ansible.builtin.user:
        name: admin
        password: "{{ 'admin' | password_hash('sha512') }}"

# Play 2: Push day0 config (uses inventory credentials — admin/admin)
- name: "DAY0 — Push minimal SONiC config"
  hosts: all
  gather_facts: false
  become: true
  vars:
    config_dir: "/tmp/day1/configs"
  tasks:
    - name: "Copy Day0 config_db.json to device"
      ansible.builtin.copy:
        src: "{{ config_dir }}/{{ inventory_hostname }}.json"
        dest: /etc/sonic/config_db.json
        owner: root
        group: root
        mode: "0644"
        backup: true
      register: config_copy

    - name: "Validate config_db.json syntax"
      ansible.builtin.command: python3 -m json.tool /etc/sonic/config_db.json
      changed_when: false
      when: config_copy.changed

    - name: "Reload SONiC configuration"
      ansible.builtin.command: config reload -y
      when: config_copy.changed

    - name: "Wait for config reload to settle"
      ansible.builtin.wait_for:
        timeout: 15
      when: config_copy.changed

    - name: "Verify hostname applied"
      ansible.builtin.command: hostname
      register: current_hostname
      changed_when: false

    - name: "Report hostname"
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} → hostname is now '{{ current_hostname.stdout }}'"
